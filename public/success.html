<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Solar Contractor Insurance</title>
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    h1 {
      font-family: 'Oswald', Arial, sans-serif;
      color: #02418F;
      font-size: 2rem;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 24px;
    }
    a.btn {
      display: inline-block;
      background: #02418F;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }
    a.btn:hover {
      background: #001a47;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You!</h1>
    <p>Your message has been received. One of our solar contractor insurance specialists will contact you shortly.</p>
    <p>For immediate assistance, call <strong><a href="tel:844-967-5247" style="color:#02418F;">844-967-5247</a></strong>.</p>
